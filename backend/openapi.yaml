openapi: 3.0.3
info:
  title: Team Task Tracker API
  version: 1.0.0
  description: >
    REST API for a team-based task tracker with JWT auth (access + refresh
    rotation), role-based access control, a server-enforced task status state
    machine, filtering/pagination, and Redis-cached task lists.

    List endpoints use `POST /<resource>/all` with filters/pagination in the body.
servers:
  - url: http://localhost:8080/api
    description: Local

tags:
  - name: Auth
  - name: Users
  - name: Projects
  - name: Tasks
  - name: Analytics
  - name: Notifications
  - name: Health

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe (checks Postgres + Redis)
      security: []
      responses:
        '200': { description: Ready }
        '503': { description: Not ready }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account (the first user becomes ADMIN, others MEMBER)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, minLength: 2 }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: integer, example: 201 }
                  data:
                    type: object
                    properties:
                      accessToken: { type: string }
                      user: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive an access token (refresh token set as httpOnly cookie)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email, example: admin@example.com }
                password: { type: string, example: Admin@12345 }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: integer, example: 200 }
                  data:
                    type: object
                    properties:
                      accessToken: { type: string }
                      user: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Error' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate the refresh token and issue a new access token
      security: []
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: integer, example: 200 }
                  data:
                    type: object
                    properties:
                      accessToken: { type: string }
        '401': { $ref: '#/components/responses/Error' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current refresh token
      responses:
        '204': { description: Logged out }

  /users/all:
    post:
      tags: [Users]
      summary: List users (ADMIN, MANAGER)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserListFilters' }
      responses:
        '200':
          description: Paginated users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/User' }
        '403': { $ref: '#/components/responses/Error' }

  /users:
    post:
      tags: [Users]
      summary: Create a user (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                role: { type: string, enum: [MANAGER, MEMBER], default: MEMBER }
      responses:
        '201': { description: Created }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }

  /users/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [Users]
      summary: Get a user (ADMIN, MANAGER)
      responses:
        '200': { description: User }
        '404': { $ref: '#/components/responses/Error' }
    put:
      tags: [Users]
      summary: Update a user (ADMIN)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                password: { type: string, minLength: 8 }
                role: { type: string, enum: [ADMIN, MANAGER, MEMBER] }
      responses:
        '200': { description: Updated }
        '403': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Users]
      summary: Delete a user (ADMIN)
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Error' }

  /projects/all:
    post:
      tags: [Projects]
      summary: List projects (any authenticated user)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListFilters' }
      responses:
        '200':
          description: Paginated projects
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Project' }

  /projects:
    post:
      tags: [Projects]
      summary: Create a project (ADMIN, MANAGER)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 2 }
                description: { type: string }
      responses:
        '201': { description: Created }
        '403': { $ref: '#/components/responses/Error' }

  /projects/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [Projects]
      summary: Get a project (any authenticated user)
      responses:
        '200': { description: Project }
        '404': { $ref: '#/components/responses/Error' }
    put:
      tags: [Projects]
      summary: Update a project (ADMIN, MANAGER)
      responses:
        '200': { description: Updated }
        '403': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Projects]
      summary: Delete a project (ADMIN, MANAGER)
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Error' }

  /tasks/all:
    post:
      tags: [Tasks]
      summary: List tasks with filters and pagination
      description: MEMBERs only see tasks assigned to them. This list is Redis-cached per assignee.
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaskListFilters' }
      responses:
        '200':
          description: Paginated tasks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Task' }

  /tasks:
    post:
      tags: [Tasks]
      summary: Create a task (ADMIN, MANAGER)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, projectId]
              properties:
                title: { type: string, minLength: 1 }
                description: { type: string }
                priority: { $ref: '#/components/schemas/Priority' }
                projectId: { type: string }
                assigneeId: { type: string }
                dueDate: { type: string, format: date-time, description: Must be a future date }
      responses:
        '201': { description: Created }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }

  /tasks/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [Tasks]
      summary: Get a task (MEMBER scoped to own)
      responses:
        '200': { description: Task }
        '404': { $ref: '#/components/responses/Error' }
    put:
      tags: [Tasks]
      summary: Update task fields (MEMBER may edit own, cannot reassign/move; status not editable here)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string, nullable: true }
                priority: { $ref: '#/components/schemas/Priority' }
                projectId: { type: string }
                assigneeId: { type: string, nullable: true }
                dueDate: { type: string, format: date-time, nullable: true }
      responses:
        '200': { description: Updated }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      tags: [Tasks]
      summary: Delete a task (ADMIN, MANAGER)
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Error' }

  /tasks/{id}/status:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [Tasks]
      summary: Change task status (assignee or MANAGER/ADMIN)
      description: >
        Enforced transitions: TODO → IN_PROGRESS → IN_REVIEW → DONE; BLOCKED from
        any active state; DONE is terminal. Illegal moves return 409 INVALID_TRANSITION.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: '#/components/schemas/TaskStatus' }
      responses:
        '200': { description: Updated task }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }

  /analytics/overview:
    get:
      tags: [Analytics]
      summary: Overdue tasks per user and average completion time (ADMIN, MANAGER)
      responses:
        '200':
          description: Analytics overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: integer, example: 200 }
                  data:
                    type: object
                    properties:
                      overduePerUser:
                        type: array
                        items:
                          type: object
                          properties:
                            userId: { type: string }
                            name: { type: string }
                            email: { type: string }
                            overdueCount: { type: integer }
                      completion:
                        type: object
                        properties:
                          overall:
                            type: object
                            properties:
                              completed: { type: integer }
                              avgCompletionSeconds: { type: integer, nullable: true }
                          perUser:
                            type: array
                            items:
                              type: object
                              properties:
                                userId: { type: string }
                                name: { type: string }
                                email: { type: string }
                                completed: { type: integer }
                                avgCompletionSeconds: { type: integer }
        '403': { $ref: '#/components/responses/Error' }

  /notifications/stream:
    get:
      tags: [Notifications]
      summary: Server-Sent Events stream of task status changes
      description: >
        Emits a `task.status` event when a relevant task changes status. MEMBERs
        receive events for their assigned tasks; ADMIN/MANAGER receive all.
        EventSource cannot send headers, so the token may be passed as
        `?access_token=<jwt>`.
      parameters:
        - { name: access_token, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Error' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Error:
      description: Consistent error response
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        status: { type: integer, example: 400 }
        code: { type: string, example: VALIDATION_ERROR }
        message: { type: string, example: dueDate must be a future date }
        details: { type: object, nullable: true }

    Priority:
      type: string
      enum: [LOW, MEDIUM, HIGH]

    TaskStatus:
      type: string
      enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE, BLOCKED]

    Role:
      type: string
      enum: [ADMIN, MANAGER, MEMBER]

    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        role: { $ref: '#/components/schemas/Role' }
        createdAt: { type: string, format: date-time }

    Project:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        createdById: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Task:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        priority: { $ref: '#/components/schemas/Priority' }
        status: { $ref: '#/components/schemas/TaskStatus' }
        dueDate: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        projectId: { type: string }
        assigneeId: { type: string, nullable: true }
        createdById: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ListFilters:
      type: object
      properties:
        page: { type: integer, minimum: 1, default: 1 }
        limit: { type: integer, minimum: 1, maximum: 100, default: 20 }
        search: { type: string }
        orderBy: { type: string }
        order: { type: string, enum: [asc, desc] }

    UserListFilters:
      allOf:
        - $ref: '#/components/schemas/ListFilters'
        - type: object
          properties:
            role: { $ref: '#/components/schemas/Role' }

    TaskListFilters:
      allOf:
        - $ref: '#/components/schemas/ListFilters'
        - type: object
          properties:
            status: { $ref: '#/components/schemas/TaskStatus' }
            priority: { $ref: '#/components/schemas/Priority' }
            assigneeId: { type: string }
            projectId: { type: string }

    Paginated:
      type: object
      properties:
        status: { type: integer, example: 200 }
        data:
          type: array
          items: {}
        meta:
          type: object
          properties:
            page: { type: integer }
            limit: { type: integer }
            total: { type: integer }
            totalPages: { type: integer }
            hasNext: { type: boolean }
            hasPrev: { type: boolean }
